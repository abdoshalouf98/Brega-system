<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | شركة البريقة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { 
            --primary: #004a99; --primary-dark: #003366; --bg: #f8fafc; 
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; overflow-x: hidden; }
        
        /* الهيدر الجديد: الشعار في المنتصف وبحجم كبير */
        .header-container {
            background: white;
            padding: 30px 5%;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .header-logo {
            width: 120px; /* حجم الشعار كبير */
            height: auto;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .header-title {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: 800;
        }

        .user-info-badge {
            margin-top: 10px;
            color: #64748b;
            font-size: 0.9rem;
            background: #f1f5f9;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* زر الخيارات عائم في جهة اليسار */
        .menu-btn { 
            position: absolute;
            left: 20px;
            top: 20px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary); 
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .menu-btn:hover { background: var(--primary); color: white; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: white; z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #eee; text-align: center; }
        .nav-item { padding: 15px 25px; display: block; color: var(--primary); font-weight: 600; cursor: pointer; text-align: right; }
        .nav-item:hover { background: #f0f7ff; }
        .logout-item { color: var(--danger); margin-top: auto; border-top: 1px solid #eee; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1000; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        /* شبكة الخزانات: 4 خزانات تحت بعض (4 أعمدة) */
        .container { padding: 40px 5%; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4 خزانات في الصف الواحد */
            gap: 20px; 
        }

        /* تنسيق استجابة الشاشة للشاشات الصغيرة */
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .tank-card { 
            background: white; border-radius: 20px; padding: 20px; 
            text-align: center; border: 1px solid #eef2f6; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer;
            transition: 0.3s;
        }
        .tank-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        
        .tank-vis { width: 70px; height: 110px; border: 3px solid #334155; margin: 10px auto; position: relative; border-radius: 10px; background: #f8fafc; overflow: hidden; }
        .fuel { position: absolute; bottom: 0; width: 100%; transition: height 1s ease; }
        .qty { font-size: 1.4rem; font-weight: 800; color: var(--primary-dark); }
        .p-bar { background: #e2e8f0; height: 8px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .p-fill { height: 100%; transition: width 1s ease; }

        /* مودال التعديل والسجلات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
        .update-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header-container">
        <button class="menu-btn" onclick="toggleMenu()">خيارات</button>

        <img src="./Logo.png.PNG" class="header-logo" onerror="this.src='Logo.png'" alt="Logo">
        <h1 class="header-title">شركة البريقة لتسويق النفط</h1>
        <div id="userRole" class="user-info-badge"></div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="./Logo.png.PNG" style="width: 70px;" onerror="this.src='Logo.png'">
            <h3 style="color: var(--primary-dark); margin-top: 10px;">القائمة</h3>
        </div>
        <div class="sidebar-content">
            <div class="nav-item" onclick="toggleMenu()">لوحة التحكم</div>
            <div class="nav-item" onclick="openLogs(); toggleMenu()">كشف الحركات</div>
        </div>
        <div class="nav-item logout-item" onclick="logout()">تسجيل الخروج</div>
    </div>

    <div class="container">
        <div class="grid" id="tanksGrid"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="m-content">
            <h3 id="mTankTitle" style="text-align:center; margin-top:0">تعديل بيانات الخزان</h3>
            <label>كمية واردة (+)</label>
            <input type="number" id="inQ" placeholder="0">
            <label>كمية منصرفة (-)</label>
            <input type="number" id="outQ" placeholder="0">
            <label>درجة الحرارة الحاليّة (°C)</label>
            <input type="number" id="tempQ" step="0.1">
            <button class="update-btn" onclick="save()">تحديث البيانات</button>
            <button onclick="closeEdit()" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer">إلغاء</button>
        </div>
    </div>

    <div id="logsModal" class="modal">
        <div class="m-content" style="max-width:750px; max-height:85vh; overflow-y:auto">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <h3 style="margin:0">سجل حركات النظام</h3>
                <button onclick="downloadPDF()" style="background:var(--primary-dark); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer">تصدير PDF</button>
            </div>
            <table style="width:100%; border-collapse:collapse; margin-top:15px; text-align:center;">
                <thead><tr style="background:#f8fafc"><th style="padding:10px">الوقت</th><th>الخزان</th><th>الوارد</th><th>المنصرف</th><th>المستخدم</th></tr></thead>
                <tbody id="logsBody"></tbody>
            </table>
            <button onclick="closeLogs()" style="width:100%; background:none; border:none; margin-top:20px; color:var(--primary); cursor:pointer; font-weight:bold">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5_MXeDknEboDv9zV2CQcsQQz-Q1IadcU",
            authDomain: "brega-system.firebaseapp.com",
            projectId: "brega-system",
            databaseURL: "https://brega-system-default-rtdb.firebaseio.com",
            appId: "1:197985418350:web:09c8497e8d3c810f8dfa7f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const user = localStorage.getItem("currentUser") || "40366";
        let allTanks = [];

        window.toggleMenu = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        onValue(ref(db, 'tanks'), (snap) => {
            allTanks = Object.values(snap.val() || {});
            draw();
        });

        onValue(ref(db, 'logs'), (snap) => {
            const logs = Object.values(snap.val() || {}).reverse();
            document.getElementById('logsBody').innerHTML = logs.slice(0, 50).map(l => `
                <tr style="border-bottom:1px solid #eee">
                    <td style="font-size:0.75rem; padding:10px">${l.time}</td>
                    <td>${l.tankName}</td>
                    <td style="color:var(--success)">+${l.added}</td>
                    <td style="color:var(--danger)">-${l.subbed}</td>
                    <td>${l.user}</td>
                </tr>
            `).join('');
        });

        window.draw = function() {
            const g = document.getElementById('tanksGrid');
            g.innerHTML = '';
            document.getElementById('userRole').innerText = "الموظف: " + user;

            allTanks.forEach(t => {
                const p = (t.qty / t.cap) * 100;
                let color = p <= 25 ? "var(--danger)" : (p <= 75 ? "var(--warning)" : "var(--success)");

                g.innerHTML += `
                    <div class="tank-card" onclick="openEdit(${t.id})">
                        <div style="font-size:0.75rem; color:var(--primary); font-weight:bold; text-align:left">${t.temp}°C</div>
                        <h3 style="margin:5px 0">${t.name}</h3>
                        <div class="tank-vis">
                            <div class="fuel" style="height:${p}%; background:${color}"></div>
                        </div>
                        <div class="qty">${Math.round(t.qty).toLocaleString()} L</div>
                        <div class="p-bar"><div class="p-fill" style="width:${p}%; background:${color}"></div></div>
                        <small style="color:#94a3b8">${p.toFixed(1)}%</small>
                    </div>`;
            });
        }

        window.save = function() {
            const idx = allTanks.findIndex(x => x.id === window.currentId);
            const inV = parseFloat(document.getElementById('inQ').value) || 0;
            const outV = parseFloat(document.getElementById('outQ').value) || 0;
            const tempV = parseFloat(document.getElementById('tempQ').value);

            allTanks[idx].qty = Math.min(allTanks[idx].cap, Math.max(0, allTanks[idx].qty + inV - outV));
            if(!isNaN(tempV)) allTanks[idx].temp = tempV;

            push(ref(db, 'logs'), {
                time: new Date().toLocaleString('ar-LY'),
                tankName: allTanks[idx].name,
                added: inV,
                subbed: outV,
                user: user
            });

            set(ref(db, 'tanks'), allTanks).then(() => {
                closeEdit();
                document.getElementById('inQ').value = '';
                document.getElementById('outQ').value = '';
            });
        }

        window.openEdit = (id) => { window.currentId = id; document.getElementById('editModal').style.display = 'flex'; }
        window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; }
        window.openLogs = () => { document.getElementById('logsModal').style.display = 'flex'; }
        window.closeLogs = () => { document.getElementById('logsModal').style.display = 'none'; }
        window.logout = () => { localStorage.clear(); window.location.replace("index.html"); }
        window.downloadPDF = () => {
             const { jsPDF } = window.jspdf;
             const doc = new jsPDF();
             doc.autoTable({ html: 'table' });
             doc.save('Brega_Report.pdf');
        }
    </script>
</body>
</html>
