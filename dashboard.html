<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - شركة البريقة</title>
    <style>
        :root { --p: #004a99; --s: #002d5d; --bg: #f1f5f9; --ok: #10b981; --warn: #f59e0b; --err: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; direction: rtl; color: #1e293b; }
        .header { background: var(--p); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .out-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; }
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .tank-card { background: white; border-radius: 24px; padding: 25px; text-align: center; position: relative; border: 1px solid #e2e8f0; cursor: pointer; }
        .temp-tag { position: absolute; top: 20px; left: 20px; background: #f1f5f9; padding: 6px 12px; border-radius: 12px; font-weight: 800; }
        .tank-vis { width: 100px; height: 140px; border: 4px solid #334155; margin: 20px auto; position: relative; border-radius: 15px; background: #f8fafc; overflow: hidden; }
        .fuel { position: absolute; bottom: 0; width: 100%; transition: height 1s; }
        .qty { font-size: 1.6rem; font-weight: 800; color: var(--s); }
        .p-bar { background: #f1f5f9; height: 8px; border-radius: 10px; width: 80%; margin: 15px auto; overflow: hidden; }
        .p-fill { height: 100%; transition: 1s; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 95%; max-width: 420px; padding: 35px; border-radius: 28px; }
        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 15px; }
        .update-btn { background: var(--ok); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <div><h1>شركة البريقة</h1><small id="userRole"></small></div>
        <button onclick="logout()" class="out-btn">خروج 🔄</button>
    </header>

    <div class="container"><div class="grid" id="tanksGrid"></div></div>

    <div id="editModal" class="modal">
        <div class="m-content">
            <h3 id="mTankTitle" style="text-align:center;">تحديث البيانات</h3>
            <label>كمية داخلة (+)</label><input type="number" id="inQ">
            <label>كمية خارجة (-)</label><input type="number" id="outQ">
            <label>درجة الحرارة (°C)</label><input type="number" id="tempQ" step="0.1">
            <button class="update-btn" onclick="save()">تأكيد وحفظ</button>
            <button onclick="closeEdit()" style="width:100%; border:none; background:none; margin-top:10px; color:#94a3b8; cursor:pointer">إلغاء</button>
        </div>
    </div>

    <script>
        let currentId = null;
        let data = [];
        const user = localStorage.getItem("currentUser");

        // دالة لتحميل البيانات من الذاكرة أو إنشائها لأول مرة
        function loadTanksData() {
            const savedData = localStorage.getItem("brega_tanks_data");
            if (savedData) {
                data = JSON.parse(savedData);
            } else {
                // بيانات افتراضية لأول مرة فقط
                for(let i=1; i<=8; i++) {
                    data.push({ id: i, name: "خزان " + i, qty: 500000, cap: 1000000, temp: 25.0 });
                }
                saveToStorage();
            }
        }

        function saveToStorage() {
            localStorage.setItem("brega_tanks_data", JSON.stringify(data));
        }

        function draw() {
            const g = document.getElementById('tanksGrid');
            g.innerHTML = '';
            
            // تصفية البيانات بناءً على المستخدم (المدير يرى الكل، المشرف يرى خزانه فقط)
            let displayData = (user === "36640") ? data.filter(t => t.id === 2) : data;
            document.getElementById('userRole').innerText = (user === "36640") ? "مشرف الخزان 2" : "المدير العام";

            displayData.forEach(t => {
                const p = (t.qty / t.cap) * 100;
                let c = p < 25 ? "var(--err)" : (p <= 75 ? "var(--warn)" : "var(--ok)");
                g.innerHTML += `
                    <div class="tank-card" onclick="openEdit(${t.id})">
                        <div class="temp-tag">${t.temp}°C 🌡️</div>
                        <h3 style="margin-top:35px">${t.name}</h3>
                        <div class="tank-vis"><div class="fuel" style="height:${p}%; background:${c}"></div></div>
                        <div class="qty">${t.qty.toLocaleString()} لتر</div>
                        <div class="p-bar"><div class="p-fill" style="width:${p}%; background:${c}"></div></div>
                        <small>${p.toFixed(1)}%</small>
                    </div>`;
            });
        }

        function openEdit(id) {
            currentId = id; 
            const t = data.find(x => x.id === id);
            document.getElementById('mTankTitle').innerText = t.name;
            document.getElementById('tempQ').value = t.temp;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEdit() { document.getElementById('editModal').style.display = 'none'; }

        function save() {
            const index = data.findIndex(x => x.id === currentId);
            const i = parseFloat(document.getElementById('inQ').value) || 0;
            const o = parseFloat(document.getElementById('outQ').value) || 0;
            const temp = parseFloat(document.getElementById('tempQ').value);

            data[index].qty = Math.min(data[index].cap, Math.max(0, data[index].qty + i - o));
            if(!isNaN(temp)) data[index].temp = temp;
            
            saveToStorage(); // حفظ في ذاكرة المتصفح
            draw(); 
            closeEdit();
            document.getElementById('inQ').value = ""; 
            document.getElementById('outQ').value = "";
        }

        function logout() { window.location.replace("index.html"); }

        // عند التشغيل
        loadTanksData();
        draw();
    </script>
</body>
</html>
