<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة البريقة - لوحة التحكم</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --p: #004a99; --s: #002d5d; --bg: #f1f5f9; --ok: #10b981; --warn: #f59e0b; --err: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; overflow-x: hidden; }
        
        /* الهيدر مع زر القائمة */
        .header { background: var(--p); color: white; padding: 15px 5%; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 5px; margin-left: 20px; }
        .menu-icon span { width: 25px; height: 3px; background: white; border-radius: 2px; }

        /* القائمة الجانبية (Sidebar) */
        .sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: var(--s); color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        .sidebar.active { right: 0; }
        .sidebar-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; text-decoration: none; display: block; font-size: 1.1rem; }
        .sidebar-item:hover { background: var(--p); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay.active { display: block; }

        /* المحتوى والتبديل بين الصفحات */
        .container { padding: 30px 5%; }
        .section { display: none; }
        .section.active { display: block; }

        /* تصميم البطاقات (التصميم الأول) */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .tank-card { background: white; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tank-vis { width: 90px; height: 130px; border: 4px solid #334155; margin: 15px auto; position: relative; border-radius: 12px; background: #f1f5f9; overflow: hidden; }
        .fuel { position: absolute; bottom: 0; width: 100%; transition: height 1s; }
        .qty { font-size: 1.5rem; font-weight: 800; color: var(--s); }

        /* تصميم الجدول للـ PDF */
        #pdf-area { background: white; padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8fafc; }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 3000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header class="header">
        <div class="menu-icon" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <h2 style="margin:0">منظومة البريقة</h2>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-item" onclick="showSection('tanksSec')">الصفحة الرئيسية</div>
        <div class="sidebar-item" onclick="showSection('logsSec')">كشف حركات الخزانات</div>
        <div class="sidebar-item" onclick="logout()" style="color: #ff8888; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px;">تسجيل الخروج</div>
    </nav>

    <div class="container">
        <section id="tanksSec" class="section active">
            <h3 id="userRole">...</h3>
            <div class="grid" id="tanksGrid"></div>
        </section>

        <section id="logsSec" class="section">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>كشف حركات الخزانات</h3>
                <button onclick="downloadPDF()" style="background:var(--err); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">تحميل كـ PDF</button>
            </div>
            <div id="pdf-area">
                <div style="text-align:center; border-bottom: 2px solid var(--p); padding-bottom: 10px; margin-bottom: 20px;">
                    <h2 style="color:var(--p); margin:0;">شركة البريقة لتسويق النفط</h2>
                    <p>تقرير حركة المخزون العام</p>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>التاريخ والوقت</th>
                            <th>الخزان</th>
                            <th>وارد (+)</th>
                            <th>منصرف (-)</th>
                            <th>الإجمالي</th>
                            <th>الموظف</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="editModal" class="modal">
        <div class="m-content">
            <h3 style="text-align:center">تعديل المخزون</h3>
            <label>كمية واردة</label><input type="number" id="inQ" placeholder="0">
            <label>كمية منصرفة</label><input type="number" id="outQ" placeholder="0">
            <label>درجة الحرارة</label><input type="number" id="tempQ" step="0.1">
            <button onclick="save()" style="width:100%; padding:15px; background:var(--ok); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">حفظ</button>
            <button onclick="closeEdit()" style="width:100%; background:none; border:none; margin-top:10px; color:gray; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5_MXeDknEboDv9zV2CQcsQQz-Q1IadcU",
            authDomain: "brega-system.firebaseapp.com",
            projectId: "brega-system",
            databaseURL: "https://brega-system-default-rtdb.firebaseio.com",
            storageBucket: "brega-system.firebasestorage.app",
            messagingSenderId: "197985418350",
            appId: "1:197985418350:web:09c8497e8d3c810f8dfa7f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const user = localStorage.getItem("currentUser") || "40366";
        let allTanks = [];

        // التحكم في القائمة
        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // التبديل بين الأقسام
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleMenu();
        }

        onValue(ref(db, 'tanks'), (s) => {
            const data = s.val();
            if (data) { allTanks = Object.values(data); draw(); }
        });

        onValue(ref(db, 'logs'), (s) => {
            const data = s.val();
            if (data) { 
                const logs = Object.values(data).reverse();
                document.getElementById('logsBody').innerHTML = logs.map(l => `
                    <tr>
                        <td>${l.time}</td><td>${l.tank}</td>
                        <td style="color:green">+${l.in}</td><td style="color:red">-${l.out}</td>
                        <td style="font-weight:bold">${l.total.toLocaleString()}</td><td>${l.user}</td>
                    </tr>`).join('');
            }
        });

        window.draw = () => {
            const g = document.getElementById('tanksGrid'); g.innerHTML = '';
            let filtered = (user === "36640") ? allTanks.filter(t => t.id === 2) : allTanks;
            document.getElementById('userRole').innerText = (user === "36640") ? "مشرف الخزان 2" : "المدير العام";

            filtered.forEach(t => {
                const p = (t.qty / t.cap) * 100;
                let color = p < 25 ? "var(--err)" : (p <= 75 ? "var(--warn)" : "var(--ok)");
                g.innerHTML += `
                    <div class="tank-card" onclick="openEdit(${t.id})">
                        <h3>${t.name}</h3>
                        <div class="tank-vis"><div class="fuel" style="height:${p}%; background:${color}"></div></div>
                        <div class="qty">${Math.round(t.qty).toLocaleString()} لتر</div>
                        <small>${p.toFixed(1)}% | ${t.temp}°C</small>
                    </div>`;
            });
        }

        window.save = () => {
            const idx = allTanks.findIndex(x => x.id === window.curId);
            const inV = parseFloat(document.getElementById('inQ').value) || 0;
            const outV = parseFloat(document.getElementById('outQ').value) || 0;
            const tmpV = parseFloat(document.getElementById('tempQ').value);
            allTanks[idx].qty = Math.max(0, Math.round(allTanks[idx].qty + inV - outV));
            if(!isNaN(tmpV)) allTanks[idx].temp = tmpV;

            push(ref(db, 'logs'), {
                time: new Date().toLocaleString('ar-LY'),
                tank: allTanks[idx].name, in: inV, out: outV, total: allTanks[idx].qty, user: user
            });
            set(ref(db, 'tanks'), allTanks).then(() => closeEdit());
        }

        window.downloadPDF = () => {
            html2canvas(document.getElementById('pdf-area'), { scale: 2 }).then(canvas => {
                const img = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(img, 'PNG', 0, 10, 210, (canvas.height * 210) / canvas.width);
                pdf.save("تقرير_البريقة.pdf");
            });
        }

        window.logout = () => { localStorage.clear(); location.replace('index.html'); }
        window.openEdit = (id) => { window.curId = id; document.getElementById('editModal').style.display = 'flex'; }
        window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; }
    </script>
</body>
</html>
