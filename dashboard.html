<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - شركة البريقة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --p: #004a99; --s: #002d5d; --bg: #f1f5f9; --ok: #10b981; --warn: #f59e0b; --err: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--p); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .container { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .tank-card { background: white; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s; }
        .tank-vis { width: 90px; height: 130px; border: 4px solid #334155; margin: 15px auto; position: relative; border-radius: 12px; background: #f1f5f9; overflow: hidden; }
        .fuel { position: absolute; bottom: 0; width: 100%; transition: height 1s; }
        .qty { font-size: 1.5rem; font-weight: 800; color: var(--s); }
        #pdf-area { background: white; padding: 30px; color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; direction: rtl; }
        th, td { border: 1px solid #000; padding: 12px; text-align: center; font-size: 11pt; }
        th { background: #f2f2f2; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 95%; max-width: 850px; padding: 25px; border-radius: 20px; max-height: 85vh; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header class="header">
        <div><h2 style="margin:0">منظومة البريقة</h2><small id="userRole"></small></div>
        <div>
            <button onclick="openLogs()" class="nav-btn">📊 كشف الحركات</button>
            <button onclick="location.replace('index.html')" class="nav-btn">خروج</button>
        </div>
    </header>

    <div class="container"><div class="grid" id="tanksGrid"></div></div>

    <div id="editModal" class="modal">
        <div class="m-content" style="max-width: 400px;">
            <h3>تعديل الكميات</h3>
            <label>وارد (+)</label><input type="number" id="inQ">
            <label>منصرف (-)</label><input type="number" id="outQ">
            <label>الحرارة</label><input type="number" id="tempQ" step="0.1">
            <button onclick="save()" style="width:100%; padding:15px; background:var(--ok); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">حفظ</button>
            <button onclick="closeEdit()" style="width:100%; background:none; border:none; margin-top:10px; color:gray; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="logsModal" class="modal">
        <div class="m-content">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0">سجل العمليات</h2>
                <button onclick="downloadPDF()" id="pdfBtn" style="background:#dc2626; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">حفظ PDF 📄</button>
            </div>
            <div id="pdf-area">
                <div style="text-align:center; border-bottom: 2px solid #004a99; padding-bottom: 10px; margin-bottom: 20px;">
                    <h2 style="margin:0; color:#004a99;">شركة البريقة لتسويق النفط</h2>
                    <p>كشف حركة المخزون - <span id="currentDate"></span></p>
                </div>
                <table>
                    <thead>
                        <tr><th>التاريخ والوقت</th><th>الخزان</th><th>وارد (+)</th><th>منصرف (-)</th><th>الإجمالي</th><th>الموظف</th></tr>
                    </thead>
                    <tbody id="logsBody"></tbody>
                </table>
            </div>
            <button onclick="closeLogs()" style="width:100%; background:none; border:none; margin-top:20px; color:gray; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5_MXeDknEboDv9zV2CQcsQQz-Q1IadcU",
            authDomain: "brega-system.firebaseapp.com",
            projectId: "brega-system",
            databaseURL: "https://brega-system-default-rtdb.firebaseio.com",
            storageBucket: "brega-system.firebasestorage.app",
            messagingSenderId: "197985418350",
            appId: "1:197985418350:web:09c8497e8d3c810f8dfa7f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const user = localStorage.getItem("currentUser") || "40366";
        let allTanks = [];
        let allLogs = [];

        onValue(ref(db, 'tanks'), (s) => {
            const data = s.val();
            if (data) { allTanks = Object.values(data); draw(); }
        });

        onValue(ref(db, 'logs'), (s) => {
            const data = s.val();
            if (data) { 
                allLogs = Object.values(data).reverse(); 
                const lb = document.getElementById('logsBody');
                if(lb) {
                    lb.innerHTML = allLogs.map(l => `
                        <tr>
                            <td>${l.time}</td><td>${l.tank}</td>
                            <td style="color:green">+${l.in.toLocaleString()}</td>
                            <td style="color:red">-${l.out.toLocaleString()}</td>
                            <td style="font-weight:bold">${l.total.toLocaleString()}</td>
                            <td>${l.user}</td>
                        </tr>`).join('');
                }
            }
        });

        window.draw = () => {
            const g = document.getElementById('tanksGrid'); g.innerHTML = '';
            let filtered = (user === "36640") ? allTanks.filter(t => t.id === 2) : allTanks;
            document.getElementById('userRole').innerText = (user === "36640") ? "مشرف الخزان 2" : "المدير العام";

            filtered.forEach(t => {
                const p = (t.qty / t.cap) * 100;
                // التنسيق اللوني بناءً على النسبة
                let color = p < 25 ? "var(--err)" : (p <= 75 ? "var(--warn)" : "var(--ok)");
                g.innerHTML += `
                    <div class="tank-card" onclick="openEdit(${t.id})">
                        <h3>${t.name}</h3>
                        <div class="tank-vis"><div class="fuel" style="height:${p}%; background:${color}"></div></div>
                        <div class="qty">${Math.round(t.qty).toLocaleString()} لتر</div>
                        <small>${p.toFixed(1)}% | ${t.temp}°C</small>
                    </div>`;
            });
        }

        window.save = () => {
            const idx = allTanks.findIndex(x => x.id === window.curId);
            const inV = parseFloat(document.getElementById('inQ').value) || 0;
            const outV = parseFloat(document.getElementById('outQ').value) || 0;
            const tmpV = parseFloat(document.getElementById('tempQ').value);
            const newQty = Math.round(allTanks[idx].qty + inV - outV);
            allTanks[idx].qty = Math.max(0, newQty);
            if(!isNaN(tmpV)) allTanks[idx].temp = tmpV;

            push(ref(db, 'logs'), {
                time: new Date().toLocaleString('ar-LY'),
                tank: allTanks[idx].name, in: inV, out: outV, total: allTanks[idx].qty, user: user
            });
            set(ref(db, 'tanks'), allTanks).then(() => {
                closeEdit();
                document.getElementById('inQ').value = ""; document.getElementById('outQ').value = "";
            });
        }

        window.downloadPDF = () => {
            html2canvas(document.getElementById('pdf-area'), { scale: 3 }).then(canvas => {
                const img = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const w = pdf.internal.pageSize.getWidth();
                pdf.addImage(img, 'PNG', 0, 10, w, (canvas.height * w) / canvas.width);
                pdf.save(`تقرير_البريقة_${new Date().toLocaleDateString()}.pdf`);
            });
        }

        window.openEdit = (id) => { window.curId = id; document.getElementById('editModal').style.display = 'flex'; }
        window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; }
        window.openLogs = () => { 
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-LY');
            document.getElementById('logsModal').style.display = 'flex'; 
        }
        window.closeLogs = () => { document.getElementById('logsModal').style.display = 'none'; }
    </script>
</body>
</html>
