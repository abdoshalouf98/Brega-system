<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - شركة البريقة</title>
    <style>
        :root { --p: #004a99; --s: #002d5d; --bg: #f1f5f9; --ok: #10b981; --warn: #f59e0b; --err: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--p); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .out-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .container { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .tank-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .tank-vis { width: 80px; height: 120px; border: 3px solid #334; margin: 15px auto; position: relative; border-radius: 10px; overflow: hidden; }
        .fuel { position: absolute; bottom: 0; width: 100%; transition: 1s; }
        .qty { font-size: 1.4rem; font-weight: bold; color: var(--s); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .update-btn { background: var(--ok); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #loading { position: fixed; top: 10px; left: 10px; background: var(--warn); color: white; padding: 5px 15px; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <div id="loading">جاري المزامنة...</div>

    <header class="header">
        <div><h1>شركة البريقة</h1><small id="userRole"></small></div>
        <button onclick="logout()" class="out-btn">خروج</button>
    </header>

    <div class="container"><div class="grid" id="tanksGrid"></div></div>

    <div id="editModal" class="modal">
        <div class="m-content">
            <h3 id="mTankTitle">تحديث البيانات</h3>
            <label>كمية داخلة (+)</label><input type="number" id="inQ" placeholder="0">
            <label>كمية خارجة (-)</label><input type="number" id="outQ" placeholder="0">
            <label>درجة الحرارة</label><input type="number" id="tempQ" step="0.1">
            <button class="update-btn" onclick="save()">حفظ وتحديث للجميع</button>
            <button onclick="closeEdit()" style="width:100%; border:none; background:none; margin-top:10px; color:gray; cursor:pointer">إلغاء</button>
        </div>
    </div>

    <script>
        const BIN_ID = "65d8c362dc74654018aa7a2b"; // هذا مخزن بيانات تجريبي
        const API_KEY = "$2a$10$Your_Fake_Key_Here"; // سيعمل الكود للعرض
        let currentId = null;
        let data = [];
        const user = localStorage.getItem("currentUser");

        // دالة لجلب البيانات من السحاب (Cloud)
        async function loadCloudData() {
            document.getElementById('loading').style.display = 'block';
            try {
                // ملاحظة: للتجربة سنستخدم الذاكرة المحلية أولاً، وإذا أردت ربط حقيقي ستحتاج مفتاح API
                const saved = localStorage.getItem("brega_global_data");
                if(saved) {
                    data = JSON.parse(saved);
                } else {
                    for(let i=1; i<=8; i++) data.push({id:i, name:"خزان "+i, qty:500000, cap:1000000, temp:25});
                }
                draw();
            } catch (e) { console.log("خطأ في الجلب"); }
            document.getElementById('loading').style.display = 'none';
        }

        function draw() {
            const g = document.getElementById('tanksGrid');
            g.innerHTML = '';
            let displayData = (user === "36640") ? data.filter(t => t.id === 2) : data;
            document.getElementById('userRole').innerText = (user === "36640") ? "مشرف الخزان 2" : "المدير العام";

            displayData.forEach(t => {
                const p = (t.qty / t.cap) * 100;
                let c = p < 25 ? "var(--err)" : (p <= 75 ? "var(--warn)" : "var(--ok)");
                g.innerHTML += `
                    <div class="tank-card" onclick="openEdit(${t.id})">
                        <div style="text-align:left">🌡️ ${t.temp}°C</div>
                        <h3>${t.name}</h3>
                        <div class="tank-vis"><div class="fuel" style="height:${p}%; background:${c}"></div></div>
                        <div class="qty">${t.qty.toLocaleString()} لتر</div>
                        <small>${p.toFixed(1)}%</small>
                    </div>`;
            });
        }

        function openEdit(id) {
            currentId = id;
            const t = data.find(x => x.id === id);
            document.getElementById('mTankTitle').innerText = t.name;
            document.getElementById('tempQ').value = t.temp;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEdit() { document.getElementById('editModal').style.display = 'none'; }

        async function save() {
            const index = data.findIndex(x => x.id === currentId);
            const i = parseFloat(document.getElementById('inQ').value) || 0;
            const o = parseFloat(document.getElementById('outQ').value) || 0;
            
            data[index].qty = Math.min(data[index].cap, Math.max(0, data[index].qty + i - o));
            data[index].temp = parseFloat(document.getElementById('tempQ').value) || data[index].temp;

            // حفظ في الذاكرة لكي تظهر عند العودة
            localStorage.setItem("brega_global_data", JSON.stringify(data));
            
            draw();
            closeEdit();
            alert("تم التحديث! ملاحظة: لكي يراها غيرك من جهاز آخر، نحتاج لربط سيرفر Firebase مجاني.");
        }

        function logout() { window.location.replace("index.html"); }

        window.onload = loadCloudData;
    </script>
</body>
</html>
