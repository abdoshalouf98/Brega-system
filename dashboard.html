<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | شركة البريقة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { 
            --primary: #004a99; --primary-dark: #003366; --bg: #f8fafc; 
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; overflow-x: hidden; }
        
        /* الهيدر الجديد: الشعار في المنتصف وكبير */
        .top-section {
            background: white; padding: 40px 5%; text-align: center;
            border-bottom: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        .main-logo { width: 150px; height: auto; margin-bottom: 15px; }
        .company-title { font-size: 1.8rem; color: var(--primary); margin: 0; font-weight: 800; }
        .user-badge { color: #64748b; font-size: 0.9rem; margin-top: 5px; }

        /* زر الخيارات في الزاوية اليسرى العلوية */
        .menu-btn { 
            position: absolute; left: 20px; top: 20px;
            background: white; border: 1.5px solid var(--primary); color: var(--primary); 
            padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .menu-btn:hover { background: var(--primary); color: white; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: white; z-index: 1001; transition: 0.4s;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .nav-item { padding: 15px 25px; display: block; color: var(--primary); font-weight: 600; cursor: pointer; text-align: right; border-bottom: 1px solid #f1f5f9; }
        .nav-item:hover { background: #f0f7ff; }
        .logout-item { color: var(--danger); margin-top: auto; border-top: 1px solid #eee; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1000; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        /* شبكة الخزانات: 4 في كل صف */
        .container { padding: 40px 5%; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4 أعمدة ثابتة */
            gap: 20px; 
        }

        /* تعديل التصميم للشاشات الصغيرة لتصبح 2 أو 1 بدل 4 */
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .tank-card { background: white; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #eef2f6; box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer; transition: 0.3s; }
        .tank-card:hover { transform: scale(1.02); }
        .tank-vis { width: 70px; height: 100px; border: 3px solid #334155; margin: 10px auto; position: relative; border-radius: 10px; background: #f8fafc; overflow: hidden; }
        .fuel { position: absolute; bottom: 0; width: 100%; transition: height 1s ease; }
        .qty { font-size: 1.3rem; font-weight: 800; color: var(--primary-dark); }
        .p-bar { background: #e2e8f0; height: 6px; border-radius: 10px; overflow: hidden; margin: 8px 0; }
        .p-fill { height: 100%; transition: width 1s ease; }

        /* النوافذ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
        .update-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-section">
        <button class="menu-btn" onclick="toggleMenu()">خيارات</button>
        <img src="./Logo.png.PNG" class="main-logo" onerror="this.src='Logo.png'" alt="Logo">
        <h1 class="company-title">شركة البريقة لتسويق النفط</h1>
        <div id="userRole" class="user-badge"></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid #eee;">
            <strong>القائمة</strong>
        </div>
        <div class="nav-item" onclick="toggleMenu()">الرئيسية</div>
        <div class="nav-item" onclick="openLogs(); toggleMenu()">كشف الحركات</div>
        <div class="nav-item logout-item" onclick="logout()">تسجيل الخروج</div>
    </div>

    <div class="container">
        <div class="grid" id="tanksGrid"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="m-content">
            <h3 id="mTankTitle" style="text-align:center;">تحديث البيانات</h3>
            <label>وارد (+)</label><input type="number" id="inQ">
            <label>منصرف (-)</label><input type="number" id="outQ">
            <label>حرارة (°C)</label><input type="number" id="tempQ" step="0.1">
            <button class="update-btn" onclick="save()">حفظ</button>
            <button onclick="closeEdit()" style="width:100%; border:none; background:none; margin-top:10px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div id="logsModal" class="modal">
        <div class="m-content" style="max-width:750px;">
            <h3>سجل الحركات</h3>
            <table style="width:100%; text-align:center;">
                <tbody id="logsBody"></tbody>
            </table>
            <button onclick="closeLogs()" style="width:100%; padding:10px; margin-top:10px;">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5_MXeDknEboDv9zV2CQcsQQz-Q1IadcU",
            authDomain: "brega-system.firebaseapp.com",
            projectId: "brega-system",
            databaseURL: "https://brega-system-default-rtdb.firebaseio.com",
            appId: "1:197985418350:web:09c8497e8d3c810f8dfa7f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const user = localStorage.getItem("currentUser") || "40366";
        let allTanks = [];

        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        onValue(ref(db, 'tanks'), (snap) => {
            allTanks = Object.values(snap.val() || {});
            const g = document.getElementById('tanksGrid');
            g.innerHTML = '';
            document.getElementById('userRole').innerText = "رقم الموظف: " + user;

            allTanks.forEach(t => {
                const p = (t.qty / t.cap) * 100;
                let color = p <= 25 ? "var(--danger)" : (p <= 75 ? "var(--warning)" : "var(--success)");

                g.innerHTML += `
                    <div class="tank-card" onclick="openEdit(${t.id})">
                        <div style="font-size:0.7rem; font-weight:bold; color:var(--primary)">${t.temp}°C</div>
                        <h4 style="margin:5px 0">${t.name}</h4>
                        <div class="tank-vis">
                            <div class="fuel" style="height:${p}%; background:${color}"></div>
                        </div>
                        <div class="qty">${Math.round(t.qty).toLocaleString()} L</div>
                        <div class="p-bar"><div class="p-fill" style="width:${p}%; background:${color}"></div></div>
                    </div>`;
            });
        });

        window.openEdit = (id) => { window.currentId = id; document.getElementById('editModal').style.display = 'flex'; }
        window.closeEdit = () => { document.getElementById('editModal').style.display = 'none'; }
        window.save = () => {
            const idx = allTanks.findIndex(x => x.id === window.currentId);
            const inV = parseFloat(document.getElementById('inQ').value) || 0;
            const outV = parseFloat(document.getElementById('outQ').value) || 0;
            allTanks[idx].qty = Math.min(allTanks[idx].cap, Math.max(0, allTanks[idx].qty + inV - outV));
            set(ref(db, 'tanks'), allTanks).then(closeEdit);
        }
        window.logout = () => { localStorage.clear(); window.location.replace("index.html"); }
    </script>
</body>
</html>
