<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - منظومة البريقة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #004a99; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="uid" placeholder="اسم المستخدم (الرقم الوظيفي)">
        <input type="password" id="ups" placeholder="كلمة السر">
        <button onclick="login()">دخول</button>
    </div>
    <script>
        function login() {
            const id = document.getElementById('uid').value;
            const ps = document.getElementById('ups').value;
            // يمكنك تعديل كلمات السر هنا
            if((id === "40366" && ps === "123") || (id === "36640" && ps === "456")) {
                localStorage.setItem("currentUser", id);
                location.replace('dashboard.html');
            } else { alert("خطأ في البيانات!"); }
        }
    </script>
</body>
</html>
