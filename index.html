<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | شركة البريقة</title>
    <style>
        :root { --primary: #004a99; --dark: #002d5d; --bg: #f0f4f8; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; direction: rtl; 
        }
        
        .login-card { 
            background: white; padding: 50px 40px; border-radius: 28px; 
            width: 100%; max-width: 400px; text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; 
        }

        .logo { width: 100px; margin-bottom: 25px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        h2 { color: var(--dark); margin-bottom: 35px; font-weight: 800; font-size: 1.6rem; }

        .input-group { text-align: right; margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #475569; font-size: 0.95rem; }
        
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; 
            box-sizing: border-box; outline: none; transition: 0.3s ease; 
            background: #fcfdfe; font-size: 1rem; 
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,74,153,0.08); }

        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-weight: 700; 
            font-size: 1.1rem; transition: 0.3s; 
        }

        button:hover { background: var(--dark); transform: translateY(-2px); }

        .error { 
            color: #ef4444; font-size: 0.9rem; margin-top: 20px; 
            display: none; background: #fff1f2; padding: 12px; border-radius: 10px; 
        }

        .footer-link { margin-top: 30px; font-size: 0.9rem; color: #64748b; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: bold; }

        /* Modal Request */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .m-content { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Brega_Petroleum_Marketing_Company_Logo.png/150px-Brega_Petroleum_Marketing_Company_Logo.png" class="logo">
        <h2>منظومة تتبع الخزانات</h2>
        
        <div class="input-group">
            <label>الرقم الوظيفي</label>
            <input type="text" id="username" placeholder="مثال: 40366">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="login()">دخول للنظام</button>
        <div id="errorMessage" class="error"></div>

        <div class="footer-link">
            ليس لديك حساب؟ <a href="#" onclick="openModal()">تقديم طلب صلاحية</a>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="m-content">
            <h3 style="margin-top:0">طلب وصول للنظام</h3>
            <div class="input-group">
                <label>الرقم الوظيفي</label>
                <input type="text" id="newU">
            </div>
            <div class="input-group">
                <label>كلمة المرور المطلوبة</label>
                <input type="password" id="newPass">
            </div>
            <button id="sendBtn" onclick="sendEmail()">إرسال الطلب</button>
            <button onclick="closeModal()" style="background:none; color:#94a3b8; margin-top:10px; border:none; width:100%; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.js"></script>
    <script>
        (function(){ emailjs.init("J6WMPCNz4MGxy6WjR"); })();

        function login() {
            const u = document.getElementById('username').value, 
                  p = document.getElementById('password').value, 
                  e = document.getElementById('errorMessage');

            if ((u === "40366" && p === "40366") || (u === "36640" && p === "36640")) {
                localStorage.setItem("currentUser", u); 
                window.location.href = "dashboard.html";
            } else { 
                e.style.display = "block"; 
                e.innerText = "خطأ في بيانات الدخول، يرجى المحاولة مرة أخرى."; 
            }
        }

        function openModal() { document.getElementById('regModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('regModal').style.display = 'none'; }

        function sendEmail() {
            const u = document.getElementById('newU').value, p = document.getElementById('newPass').value, btn = document.getElementById('sendBtn');
            if(!u || !p) { alert("الرجاء تعبئة الحقول"); return; }
            btn.innerText = "جاري المعالجة..."; btn.disabled = true;
            emailjs.send('service_x51n5hk', 'template_0jv1nde', { new_user: u, new_pass: p })
            .then(() => { 
                alert("تم إرسال طلبك للإدارة بنجاح"); 
                closeModal(); 
                btn.innerText = "إرسال الطلب"; btn.disabled = false; 
            }, (err) => { 
                alert("حدث خطأ في الاتصال"); 
                btn.disabled = false; 
            });
        }
    </script>
</body>
</html>
