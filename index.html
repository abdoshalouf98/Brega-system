<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - منظومة البريقة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #004a99; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        .login-box { background: white; color: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        button { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color:#004a99">شركة البريقة</h2>
        <p>الرجاء إدخال الرقم الوظيفي</p>
        <input type="password" id="idInput" placeholder="الرقم الوظيفي">
        <button onclick="login()">دخول للمنظومة</button>
        <p id="msg" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
    </div>

    <script>
        function login() {
            const id = document.getElementById('idInput').value;
            if(id === "40366" || id === "36640") {
                localStorage.setItem("currentUser", id);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('msg').innerText = "رقم غير صحيح، حاول ثانية";
            }
        }
    </script>
</body>
</html>
